<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Order Processing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <span class="navbar-brand">Order Processing</span>
        <div class="ms-auto d-flex align-items-center gap-2">
            <a href="signup.html" class="btn btn-sm btn-outline-light me-2">Sign Up</a>
            <input type="text" id="username" class="form-control form-control-sm" placeholder="Username"
                   style="width: 120px;">
            <input type="password" id="password" class="form-control form-control-sm" placeholder="Password"
                   style="width: 120px;">
            <button id="login-btn" class="btn btn-sm btn-light">Login</button>
            <button id="logout-btn" class="btn btn-sm btn-light" style="display: none;">Logout</button>
            <span id="login-status" class="text-light small ms-2"></span>
        </div>
    </div>
</nav>

<div class="container mt-5" id="login-prompt" style="display: block;">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h4 class="card-title mb-3">Welcome to Order Processing</h4>
                    <p class="card-text text-muted">Please log in to access your orders and create new ones.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<main class="container-fluid mb-5" style="display: none;" id="main-content">
    <div class="row g-4">
        <div class="col-lg-5" id="customer-section">

            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Create New Order</h5>
                </div>
                <div class="card-body">
                    <form id="order-form">
                        <div class="mb-3">
                            <label class="form-label">Customer Name</label>
                            <input type="text" class="form-control" id="customerName" readonly required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Customer Email</label>
                            <input type="email" class="form-control" id="customerEmail" readonly required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Shipping Address</label>
                            <textarea class="form-control" id="shippingAddress" rows="2" required></textarea>
                        </div>

                        <h6 class="mt-3">Select Products</h6>
                        <div class="table-responsive mb-3">
                            <table class="table table-striped" id="products-table">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Description</th>
                                        <th>Price</th>
                                        <th>Quantity</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="products-table-body">
                                </tbody>
                            </table>
                        </div>

                        <h6>Order Cart</h6>
                        <div id="selected-items" class="mb-3"></div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary">Place Order</button>
                        </div>
                        <div id="form-message" class="mt-2 small"></div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-7" id="orders-column">
            <div class="card shadow-sm mb-3">
                <div class="card-header bg-white d-flex align-items-center justify-content-between">
                    <h5 class="mb-0">Orders</h5>
                    <div class="d-flex align-items-center gap-2">
                        <select id="status-filter" class="form-select form-select-sm" style="width: 180px;">
                            <option value="">All Statuses</option>
                            <option value="PENDING">Pending</option>
                            <option value="PROCESSING">Processing</option>
                            <option value="SHIPPED">Shipped</option>
                            <option value="DELIVERED">Delivered</option>
                            <option value="CANCELLED">Cancelled</option>
                        </select>
                        <button id="refresh-orders" class="btn btn-outline-secondary btn-sm">Refresh</button>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th id="th-customer">Customer</th>
                                <th>Status</th>
                                <th>Total</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody id="orders-table-body">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h6 class="mb-0">Order Details</h6>
                </div>
                <div class="card-body" id="order-details">
                    <p class="text-muted mb-0">Select an order to see details.</p>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="app.js"></script>
</body>
</html>
