<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Sign Up - Order Processing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <span class="navbar-brand">Order Processing</span>
        <div class="ms-auto">
            <a href="index.html" class="btn btn-sm btn-light">Login</a>
        </div>
    </div>
</nav>

<main class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Sign Up</h5>
                </div>
                <div class="card-body">
                    <form id="signup-form">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" required/>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Sign Up</button>
                        </div>
                        <div id="form-message" class="mt-2 small"></div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formMessage = document.getElementById('form-message');
    formMessage.textContent = '';

    const payload = {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
        email: document.getElementById('email').value.trim(),
        name: document.getElementById('name').value.trim()
    };

    try {
        const res = await fetch('/api/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const message = await res.text();
        if (res.ok) {
            formMessage.textContent = message;
            formMessage.className = 'mt-2 small text-success';
            setTimeout(() => window.location.href = 'index.html', 2000);
        } else {
            formMessage.textContent = message;
            formMessage.className = 'mt-2 small text-danger';
        }
    } catch (e) {
        formMessage.textContent = 'An error occurred. Please try again.';
        formMessage.className = 'mt-2 small text-danger';
    }
});
</script>
</body>
</html>
